{% extends "layout.html" %}

{% block title %}Profile{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <i class="bi bi-person-circle logo-icon"></i>
            <h3 class="brand-title mt-2 mb-1">My Profile</h3>
            <p class="brand-subtitle mb-0">Account details</p>
          </div>

          <div class="mb-3">
            <label class="form-label text-muted mb-1">Full Name</label>
            <div class="form-control bg-light">{{ user.full_name }}</div>
          </div>

          <div class="mb-3">
            <label class="form-label text-muted mb-1">Username</label>
            <div class="form-control bg-light">{{ user.username }}</div>
          </div>

          <div class="mb-1">
            <label class="form-label text-muted mb-1">Role</label>
            <div class="form-control bg-light text-capitalize">{{ user.role }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
