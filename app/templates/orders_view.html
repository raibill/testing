{% extends "layout.html" %}

{% block title %}Orders{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h3 class="mb-0">Student Orders</h3>
      <small id="orders-subtitle" class="text-muted"></small>
    </div>
    <div class="d-flex gap-2">
      <button id="served-btn" class="btn btn-success btn-sm" onclick="markServed()">
        <i class="bi bi-check2-circle me-1"></i> SERVED
      </button>
      <a class="btn btn-secondary btn-sm" href="/orders">Back</a>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-striped mb-0">
        <thead>
          <tr>
            <th>Item</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Status</th>
            <th>Action</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="orders-view-container">
          <tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="mt-3 text-end">
    <h5 class="mb-0">Food Total: ₱<span id="orders-food-total">0.00</span></h5>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const sessionId = parseInt("{{ session_id }}");

function loadOrders() {
  fetch(`/api/session-orders/${sessionId}`, { credentials: "include" })
    .then(res => res.json())
    .then(data => {
      const subtitle = document.getElementById("orders-subtitle");
      subtitle.innerText = data.customer_name
        ? `${data.customer_name} • ${data.space_type || "N/A"} • ${data.time_in || ""}`
        : `Session ${sessionId}`;

      const container = document.getElementById("orders-view-container");

      if (!data.orders || !data.orders.length) {
        container.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">No orders found.</td></tr>`;
        document.getElementById("orders-food-total").innerText = "0.00";
        return;
      }

      container.innerHTML = data.orders.map(item => {
        // Use per-item status; fall back gracefully for older rows
        const rawStatus = item.item_status || "preparing";
        const isPreparing = (rawStatus === "preparing" || rawStatus === "preparin");
        const statusLabel = isPreparing ? "Preparing" : "Done";
        const btnLabel   = isPreparing ? "Preparing" : "Done";
        const btnClass   = isPreparing ? "btn-warning" : "btn-success";

        return `
          <tr>
            <td>${item.item_name}</td>
            <td>${item.quantity}</td>
            <td>₱${item.price.toFixed(2)}</td>
            <td>
              <span class="badge ${isPreparing ? 'bg-warning text-dark' : 'bg-success'}">
                ${statusLabel}
              </span>
            </td>
            <td>
              <button class="btn btn-sm ${btnClass}"
                      onclick="toggleItemStatus(${item.id})">
                ${btnLabel}
              </button>
            </td>
            <td>₱${item.total.toFixed(2)}</td>
          </tr>
        `;
      }).join("");

      document.getElementById("orders-food-total").innerText = data.food_total.toFixed(2);
    })
    .catch(() => {
      showToast("Failed to load orders. Please try again.", "error");
    });
}

// Toggle a single item's status (preparing <-> done)
function toggleItemStatus(itemId) {
  fetch(`/api/order-item-status/${itemId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    credentials: "include"
  })
  .then(res => res.json())
  .then(data => {
    if (data.error) {
      showToast(data.error, "error");
      return;
    }
    loadOrders();
  })
  .catch(() => {
    showToast("Failed to update item status. Please try again.", "error");
  });
}

// Mark the whole session as served and return to orders list
function markServed() {
  const btn = document.getElementById("served-btn");
  btn.disabled = true;
  btn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i> Marking...';

  fetch(`/api/session-served/${sessionId}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include"
  })
  .then(res => res.json())
  .then(data => {
    if (data.error) {
      showToast(data.error, "error");
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-check2-circle me-1"></i> SERVED';
      return;
    }
    showToast("Order marked as served!", "success");
    setTimeout(() => { window.location.href = "/orders"; }, 800);
  })
  .catch(() => {
    showToast("Failed to mark as served. Please try again.", "error");
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-check2-circle me-1"></i> SERVED';
  });
}

loadOrders();
</script>
{% endblock %}
