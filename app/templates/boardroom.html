{% extends "layout.html" %}

{% block title %}Boardroom{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <div>
            <h3 class="mb-0">Boardroom Bookings</h3>
            <small id="booking-count" class="text-muted">0 bookings</small>
        </div>

    </div>

    <div id="booking-container" class="row"></div>

    <div id="empty-message" class="text-center mt-4 text-muted" style="display:none;">
        No bookings at the moment.
    </div>

</div>

<!-- BOOKING MODAL -->
<div class="modal fade" id="bookingModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Book Boardroom</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input id="name" class="form-control mb-2" placeholder="Customer Name">
        <input id="date" type="date" class="form-control mb-2">
        <input id="start" type="time" class="form-control mb-2">
        <input id="end" type="time" class="form-control mb-2">
        <input id="people" type="number" class="form-control mb-2" placeholder="Number of People">
        <input id="purpose" class="form-control mb-2" placeholder="Purpose">

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="bookBoardroom()">Book</button>
      </div>

    </div>
  </div>
</div>

<!-- FLOATING BUTTON -->
<button id="floatingAddBtn"
    class="btn btn-success"
    data-bs-toggle="modal"
    data-bs-target="#bookingModal">
    +
</button>

{% endblock %}


{% block scripts %}

<script>

// LOAD BOOKINGS
function loadBookings() {

    fetch("/api/boardroom-bookings")
    .then(res => res.json())
    .then(data => {

        let container = document.getElementById("booking-container");
        let emptyMsg = document.getElementById("empty-message");

        container.innerHTML = "";

        if (data.length === 0) {
            emptyMsg.style.display = "block";
        } else {
            emptyMsg.style.display = "none";
        }

        document.getElementById("booking-count").innerText = `${data.length} booking(s)`;

        data.forEach(b => {

            container.innerHTML += `
                <div class="col-md-4 mb-3">
                    <div class="card shadow-sm">
                        <div class="card-body">

                            <h5>${b.customer_name}</h5>

                            <p><strong>Date:</strong> ${b.date}</p>
                            <p><strong>Time:</strong> ${b.start_time} - ${b.end_time}</p>

                            <p><strong>People:</strong> ${b.number_of_people}</p>
                            <p><strong>Purpose:</strong> ${b.purpose || "N/A"}</p>

                        </div>
                    </div>
                </div>
            `;
        });

    });
}


// BOOK FUNCTION
function bookBoardroom() {

    fetch("/api/book-boardroom", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            customer_name: document.getElementById("name").value,
            date: document.getElementById("date").value,
            start_time: document.getElementById("start").value,
            end_time: document.getElementById("end").value,
            number_of_people: document.getElementById("people").value,
            purpose: document.getElementById("purpose").value
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.error) {
            showToast(data.error, "error");
            return;
        }

        showToast("Booking successful!", "success");

        let modal = bootstrap.Modal.getInstance(document.getElementById('bookingModal'));
        modal.hide();

        // Clear form
        document.getElementById("name").value = "";
        document.getElementById("date").value = "";
        document.getElementById("start").value = "";
        document.getElementById("end").value = "";
        document.getElementById("people").value = "";
        document.getElementById("purpose").value = "";

        loadBookings();
    })
    .catch(err => {
        showToast("An error occurred. Please try again.", "error");
    });
}


// INIT
loadBookings();

</script>

{% endblock %}
