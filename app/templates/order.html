{% extends "layout.html" %}

{% block title %}Add Order{% endblock %}

{% block content %}

<div class="container mt-4">

    <h3 class="mb-4">Add Order</h3>

    <div class="row">

        <!-- MENU -->
        <div class="col-md-8">
            <h5>Menu</h5>
            <div id="menu-container" class="row"></div>
        </div>

        <!-- CART -->
        <div class="col-md-4">
            <h5>Current Orders</h5>
            <ul id="current-orders-list" class="list-group mb-3"></ul>
            <h6 class="mb-3">Current Food Total: ₱<span id="current-food-total">0.00</span></h6>

            <hr />

            <h5>New Items</h5>
            <ul id="cart-list" class="list-group mb-3"></ul>

            <h5>Total: ₱<span id="total">0.00</span></h5>

            <button class="btn btn-success w-100 mt-3" onclick="submitOrder()">
                Place Order
            </button>

            <button class="btn btn-secondary w-100 mt-2" onclick="goBack()">
                Back
            </button>
        </div>

    </div>

</div>

{% endblock %}


{% block scripts %}

<script>

const sessionId = parseInt("{{ session_id }}");
let cart = [];
let currentOrders = [];
let menuById = {};

// LOAD MENU
function loadMenu() {

    fetch("/api/menu", {
        credentials: "include"
    })
    .then(res => res.json())
    .then(data => {
        let container = document.getElementById("menu-container");
        container.innerHTML = "";

        menuById = {};

        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = '<div class="col-12 text-center text-muted">No menu items available.</div>';
            return;
        }

        function parseCategory(category) {
            // Categories can be like:
            // "MainDish - Silog", "Snacks - Pancit", "Drinks - Coffee (Hot)"
            // Backward compatible categories like "Drink", "Food", "Snack" are also supported.
            if (!category) return { major: "Other", sub: "Other" };

            const parts = String(category).split(" - ");
            const majorToken = (parts[0] || "").trim();
            const sub = parts.length > 1 ? parts.slice(1).join(" - ").trim() : "All";

            const majorMap = {
                "MainDish": "MainDish",
                "Food": "MainDish",
                "Snacks": "Snacks",
                "Snack": "Snacks",
                "Drinks": "Drinks",
                "Drink": "Drinks"
            };

            return { major: majorMap[majorToken] || majorToken || "Other", sub };
        }

        // grouped[major][sub] = [items...]
        const grouped = {};
        const majorOrder = ["MainDish", "Snacks", "Drinks", "Other"];

        data.forEach(item => {
            menuById[item.id] = { name: item.name, price: item.price };

            const parsed = parseCategory(item.category);
            const major = parsed.major;
            const sub = parsed.sub || "All";

            if (!grouped[major]) grouped[major] = { subOrder: [], subs: {} };
            if (!grouped[major].subs[sub]) {
                grouped[major].subs[sub] = [];
                grouped[major].subOrder.push(sub);
            }

            grouped[major].subs[sub].push(item);
        });

        let html = "";
        majorOrder.forEach(major => {
            if (!grouped[major] || !grouped[major].subOrder.length) return;

            const majorTitleMap = {
                "MainDish": "Main Dish",
                "Snacks": "Snacks",
                "Drinks": "Drinks",
                "Other": "Other"
            };

            html += `
                <div class="col-12 mb-4">
                    <h5 class="mb-3">${majorTitleMap[major] || major}</h5>
            `;

            grouped[major].subOrder.forEach(sub => {
                const items = grouped[major].subs[sub] || [];
                if (!items.length) return;

                html += `
                    <h6 class="text-muted mb-2">${sub}</h6>
                    <div class="row g-2 mb-3">
                `;

                items.forEach(item => {
                    html += `
                        <div class="col-6 col-md-4">
                            <div class="card shadow-sm p-3 h-100">
                                <h5 class="fs-6 mb-2">${item.name}</h5>
                                <p class="mb-3 text-muted">₱${Number(item.price).toFixed(2)}</p>
                                <button class="btn btn-primary btn-sm w-100"
                                    onclick="addToCart(${item.id})">
                                    Add
                                </button>
                            </div>
                        </div>
                    `;
                });

                html += `
                    </div>
                `;
            });

            html += `</div>`;
        });

        container.innerHTML = html;
    })
    .catch(err => {
        showToast("Failed to load menu. Please refresh the page.", "error");
    });
}

// LOAD CURRENT ORDERS (existing order items for this session)
function loadCurrentOrders() {
    fetch(`/api/session-orders/${sessionId}`, { credentials: "include" })
    .then(res => res.json())
    .then(data => {
        currentOrders = data.orders || [];

        let list = document.getElementById("current-orders-list");
        list.innerHTML = "";

        let currentFoodTotal = data.food_total ?? 0;
        document.getElementById("current-food-total").innerText = Number(currentFoodTotal).toFixed(2);

        if (!currentOrders.length) {
            list.innerHTML = `<li class="list-group-item text-center text-muted">No orders yet.</li>`;
            return;
        }

        currentOrders.forEach(item => {
            list.innerHTML += `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        ${item.item_name} x${item.quantity}
                        <div class="text-muted" style="font-size:13px;">₱${item.total.toFixed(2)}</div>
                    </div>
                    <button class="btn btn-sm btn-outline-danger" onclick="voidExistingItem(${item.id})">
                        Void
                    </button>
                </li>
            `;
        });
    })
    .catch(err => {
        showToast("Failed to load current orders.", "error");
    });
}

function voidExistingItem(itemId) {
    if (!confirm("Remove this order item?")) return;
    fetch(`/api/void-item/${itemId}`, { method: "DELETE", credentials: "include" })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            showToast(data.error, "error");
            return;
        }
        showToast("Item removed successfully.", "success");
        loadCurrentOrders();
    })
    .catch(err => {
        showToast("Failed to remove item. Please try again.", "error");
    });
}


// ADD TO CART
function addToCart(id) {
    const meta = menuById[id];
    if (!meta) return;
    const name = meta.name;
    const price = meta.price;

    let existing = cart.find(item => item.id === id);

    if (existing) {
        existing.quantity += 1;
    } else {
        cart.push({ id, name, price, quantity: 1 });
    }

    renderCart();
}


// RENDER CART
function renderCart() {

    let list = document.getElementById("cart-list");
    let total = 0;

    list.innerHTML = "";

    cart.forEach(item => {

        let itemTotal = item.price * item.quantity;
        total += itemTotal;

        list.innerHTML += `
            <li class="list-group-item d-flex justify-content-between">
                ${item.name} x${item.quantity}
                <span>₱${itemTotal.toFixed(2)}</span>
            </li>
        `;
    });

    document.getElementById("total").innerText = total.toFixed(2);
}


// 🔥 SUBMIT ORDER
function submitOrder() {

    if (cart.length === 0) {
        showToast("Cart is empty!", "error");
        return;
    }

    let items = cart.map(item => ({
        menu_item_id: item.id,
        quantity: item.quantity
    }));

    fetch("/api/add-order", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        credentials: "include",
        body: JSON.stringify({
            session_id: sessionId,
            items: items
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.error) {
            showToast(data.error, "error");
            return;
        }

        showToast("Order placed successfully!", "success");
        cart = [];
        renderCart();
        loadCurrentOrders();

    })
    .catch(err => {
        showToast("Failed to place order. Please try again.", "error");
    });
}


// 🔙 BACK BUTTON
function goBack() {
    window.location.href = "/dashboard";
}


// LOAD MENU ON PAGE LOAD
loadMenu();
loadCurrentOrders();

</script>

{% endblock %}
